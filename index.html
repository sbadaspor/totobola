<html lang="pt">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Totobola entre Amigos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f6f5f1;
    --surface: #ffffff;
    --ink: #14140f;
    --muted: #6b6960;
    --line: #e6e3da;
    --accent: #1e5b3a;
    --accent-soft: #e8f0ea;
    --gold: #c89b3c;
    --danger: #b3361f;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(20,20,15,.04), 0 8px 24px rgba(20,20,15,.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .brand {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.02em;
  }
  .brand .dot { color: var(--accent); }
  .brand small {
    display: block; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-top: 2px;
  }
  nav.tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
  nav.tabs button {
    border: 0; background: transparent; padding: 8px 16px; border-radius: 999px;
    font: inherit; font-weight: 500; color: var(--muted); cursor: pointer;
  }
  nav.tabs button.active { background: var(--ink); color: #fff; }

  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px 24px; margin-bottom: 20px;
  }
  .card h2 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; margin: 0 0 4px; letter-spacing: -0.01em;
  }
  .card .sub {
    font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 18px;
  }
  .row-head, .row {
    display: grid; align-items: center; gap: 12px; padding: 12px 8px; border-bottom: 1px solid var(--line);
  }
  .row-head {
    font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); border-bottom: 1px solid var(--ink);
  }
  .row:last-child { border-bottom: 0; }

  .standings .row-head, .standings .row { grid-template-columns: 40px 36px 1fr 80px 80px 80px; }
  .standings .pts { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; text-align: right; }
  .rank { font-family: 'Fraunces', serif; font-size: 18px; color: var(--muted); }
  .rank.top { color: var(--gold); }
  .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }

  .games .row-head, .games .row { grid-template-columns: 70px 1fr 100px 1fr; }
  .games .row { padding: 14px 8px; }
  .games .gdate { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-variant-numeric: tabular-nums; }
  .games .home { text-align: right; font-weight: 500; }
  .games .away { text-align: left; font-weight: 500; }
  .games .score {
    text-align: center; font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px;
    background: var(--accent-soft); color: var(--accent); padding: 4px 10px; border-radius: 8px;
  }
  .games .score.empty { background: transparent; color: var(--muted); font-weight: 400; font-style: italic; font-family: 'Inter', sans-serif; font-size: 13px; }

  .bets-grid { overflow-x: auto; }
  .bets-grid table { width: 100%; border-collapse: collapse; min-width: 500px; }
  .bets-grid th, .bets-grid td { padding: 10px 8px; text-align: center; border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
  .bets-grid th { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--ink); }
  .bets-grid td.match { text-align: left; font-size: 12px; color: var(--muted); }
  .bets-grid td.bet { font-family: 'Fraunces', serif; font-weight: 500; }
  .bets-grid td.bet.exact { background: var(--accent-soft); color: var(--accent); border-radius: 6px; }
  .bets-grid td.bet.outcome { background: #fff5d9; color: #7a5a00; border-radius: 6px; }
  .bets-grid td.bet.miss { background: #fbe4df; color: var(--danger); border-radius: 6px; }
  .bets-grid tfoot td { font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; padding-top: 14px; border-bottom: 0; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-style: italic; }
  .empty .big { font-family: 'Fraunces', serif; font-size: 18px; font-style: normal; color: var(--ink); margin-bottom: 6px; }

  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  input, select, textarea {
    width: 100%; font: inherit; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 8px; background: #fafaf7;
    color: var(--ink); transition: border .15s;
  }
  input:focus, select:focus, textarea:focus { outline: 0; border-color: var(--accent); background: #fff; }
  input[type=number] { -moz-appearance: textfield; }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  button.btn {
    background: var(--ink); color: #fff; border: 0; padding: 10px 18px;
    border-radius: 8px; font: inherit; font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  button.btn:hover { opacity: .85; }
  button.btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  button.btn.danger { background: var(--danger); }
  button.btn.accent { background: var(--accent); }

  .field-row { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .field-row .vs { text-align: center; color: var(--muted); font-size: 11px; }
  .score-row { display: grid; grid-template-columns: 1fr 50px 14px 50px 1fr 30px; gap: 6px; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .score-row .lbl { color: var(--muted); }
  .score-row .lbl.l { text-align: right; }
  .score-row .x { text-align: center; color: var(--muted); }
  .score-row input { text-align: center; padding: 6px 4px; }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; background: var(--accent-soft); color: var(--accent); margin-left: 8px; }
  .pill.muted { background: var(--line); color: var(--muted); }

  details.player-block { border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; background: #fafaf7; }
  details.player-block summary { cursor: pointer; font-weight: 500; outline: 0; }
  details.player-block[open] { background: #fff; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .small { font-size: 12px; color: var(--muted); }
  .danger-zone { border-top: 1px dashed var(--line); margin-top: 24px; padding-top: 16px; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
    border: 2px solid var(--line); background: var(--line); flex-shrink: 0;
    display: inline-block; vertical-align: middle;
  }
  .avatar-lg {
    width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
    border: 3px solid var(--line); background: var(--line); display: block;
    margin-bottom: 12px;
  }
  .avatar-sm {
    width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
    border: 1px solid var(--line); background: var(--line); flex-shrink: 0;
    display: inline-block; vertical-align: middle;
  }
  .avatar-placeholder {
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 14px;
    text-transform: uppercase;
  }
  .avatar-placeholder-lg {
    font-size: 26px; width: 72px; height: 72px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600;
    border: 3px solid var(--line); margin-bottom: 12px; flex-shrink: 0;
  }
  .avatar-upload-btn { cursor: pointer; font-size: 11px; color: var(--accent); text-decoration: underline; }

  .login-box { max-width: 380px; margin: 40px auto; }
  .login-box .card { text-align: center; }
  .err { color: var(--danger); font-size: 13px; margin-top: 8px; }
  .ok { color: var(--accent); font-size: 13px; margin-top: 8px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: 13px; box-shadow: var(--shadow); opacity: 0; transition: opacity .2s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .config-error {
    max-width: 600px; margin: 60px auto; background: #fff; border: 2px solid var(--danger);
    border-radius: var(--radius); padding: 24px;
  }
  .config-error h2 { color: var(--danger); margin-top: 0; }
  .config-error code { background: #f6f5f1; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* ── Countdown ── */
  .countdown-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    background: #fff8e6; border: 1px solid #f0d88a; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 20px;
  }
  .countdown-bar.urgent { background: #fbe4df; border-color: #e8b4aa; }
  .countdown-bar.locked { background: #f0f0ee; border-color: var(--line); }
  .countdown-label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  .countdown-time { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: #7a5a00; letter-spacing: .02em; }
  .countdown-bar.urgent .countdown-time { color: var(--danger); }
  .countdown-bar.locked .countdown-time { color: var(--muted); font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 500; }

  /* ── Mobile bets scroll table ── */
  .mobile-bets { display: none; }
  .mobile-bets-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .mobile-bets-table { border-collapse: collapse; white-space: nowrap; }
  .mobile-bets-table th, .mobile-bets-table td {
    padding: 9px 12px; border-bottom: 1px solid var(--line); text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .mobile-bets-table th {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); font-weight: 500; border-bottom: 2px solid var(--ink);
    background: var(--surface); position: sticky; top: 0;
  }
  .mobile-bets-table td.player-col {
    text-align: left; font-weight: 500; white-space: nowrap;
    position: sticky; left: 0; background: var(--surface);
    border-right: 1px solid var(--line); padding-right: 14px; z-index: 1;
  }
  .mobile-bets-table td.player-col-head {
    text-align: left; position: sticky; left: 0; background: var(--surface);
    border-right: 1px solid var(--line); z-index: 2;
  }
  .mobile-bets-table .bet-cell { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; }
  .mobile-bets-table .bet-cell.exact { color: var(--accent); }
  .mobile-bets-table .bet-cell.outcome { color: #7a5a00; }
  .mobile-bets-table .bet-cell.miss { color: var(--danger); }
  .mobile-bets-table tfoot td { font-family: 'Fraunces', serif; font-weight: 700; font-size: 15px; border-top: 2px solid var(--ink); border-bottom: 0; padding-top: 10px; }
  .mobile-bets-table .game-header { font-size: 11px; max-width: 90px; white-space: normal; text-align: center; line-height: 1.3; }

  /* ── Share button ── */
  .share-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    padding: 6px 12px; border-radius: 8px; font: inherit; font-size: 12px;
    cursor: pointer; transition: all .15s;
  }
  .share-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* ── Share canvas overlay ── */
  #share-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  #share-overlay.show { display: flex; }
  #share-box {
    background: #fff; border-radius: 16px; padding: 24px; max-width: 420px; width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,.2); text-align: center;
  }
  #share-box h3 { margin: 0 0 14px; font-family: 'Fraunces', serif; }
  #share-img { width: 100%; border-radius: 8px; margin-bottom: 14px; border: 1px solid var(--line); }
  #share-box .btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  @media (max-width: 640px) {
    .standings .row-head, .standings .row { grid-template-columns: 30px 28px 1fr 60px 60px 70px; font-size: 13px; }
    .games .row-head, .games .row { grid-template-columns: 50px 1fr 80px 1fr; gap: 6px; }
    .games .gdate { font-size: 10px; }
    .wrap { padding: 20px 14px 60px; }
    .brand { font-size: 22px; }
    /* On mobile, hide the horizontal bets table and show scroll table */
    .bets-grid-desktop { display: none !important; }
    .mobile-bets { display: block; }
    /* Compact standings on mobile */
    .standings .row-head .num, .standings .row .num { display: none; }
    .standings .row-head, .standings .row { grid-template-columns: 30px 28px 1fr 80px; }
  }
</style>
</head>

// ============ STORAGE LAYER ============
const STATE_KEY = 'app_state';

async function kvGet(key) {
  const { data, error } = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
  if (error) throw error;
  return data ? data.value : null;
}
async function kvSet(key, value) {
  const { error } = await sb.from('kv_store').upsert({ key, value, updated_at: new Date().toISOString() });
  if (error) throw error;
}

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============ COUNTDOWN ============
let countdownTimer = null;

function firstKickoff(round) {
  if (!round) return null;
  const gamesWithDate = round.games.filter(g => g.date);
  if (gamesWithDate.length === 0) return null;
  gamesWithDate.sort((a, b) => new Date(`${a.date}T${a.time||'00:00'}`) - new Date(`${b.date}T${b.time||'00:00'}`));
  return new Date(`${gamesWithDate[0].date}T${gamesWithDate[0].time||'00:00'}`);
}

function formatCountdown(ms) {
  if (ms <= 0) return null;
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (d > 0) return `${d}d ${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m`;
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function renderCountdownBar(round, elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  const kickoff = firstKickoff(round);
  if (!kickoff) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  const deadline = kickoff.getTime() - 60000; // fecha 1 min antes
  const update = () => {
    const ms = deadline - Date.now();
    if (ms <= 0) {
      el.className = 'countdown-bar locked';
      el.querySelector('.countdown-time').textContent = '🔒 Apostas fechadas';
      el.querySelector('.countdown-label').textContent = 'Fecho 1 min antes do primeiro jogo';
      clearInterval(countdownTimer);
    } else {
      const urgent = ms < 3600000; // < 1 hora
      el.className = 'countdown-bar' + (urgent ? ' urgent' : '');
      el.querySelector('.countdown-time').textContent = formatCountdown(ms);
      el.querySelector('.countdown-label').textContent = 'Fecho das apostas em';
    }
  };
  clearInterval(countdownTimer);
  update();
  countdownTimer = setInterval(update, 1000);
}

async function openShare() {
  // Build an off-screen standings card to screenshot
  const standings = generalStandings();
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;left:-9999px;top:0;width:440px;background:#f6f5f1;padding:24px;font-family:Inter,sans-serif;font-size:14px;border-radius:16px;';

    </div>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#6b6960;margin-bottom:18px">Classificação Geral</div>
    ${standings.filter(s => s.played > 0).map((s, i) => {
      const photo = (state.playerPhotos || {})[s.name];
      const initials = s.name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('');
      const avatarStyle = `width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:Fraunces,serif;font-weight:600;font-size:13px;flex-shrink:0;overflow:hidden;border:2px solid #e6e3da;`;
      const avatarEl = photo
        ? `<img src="${photo}" style="${avatarStyle}object-fit:cover;">`
        : `<span style="${avatarStyle}background:#e8f0ea;color:#1e5b3a;">${initials}</span>`;
      return `<div style="display:grid;grid-template-columns:32px 32px 1fr 60px;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid #e6e3da;">
        <div style="font-family:Fraunces,serif;font-size:17px;color:${i===0?'#c89b3c':'#6b6960'}">${i+1}</div>
        ${avatarEl}
        <div style="font-weight:500">${s.name}</div>
        <div style="font-family:Fraunces,serif;font-size:18px;font-weight:600;text-align:right">${s.pts}</div>
      </div>`;
    }).join('')}
    <div style="margin-top:14px;font-size:11px;color:#6b6960;text-align:right">gerado em ${new Date().toLocaleDateString('pt-PT')}</div>
  `;
  document.body.appendChild(div);
  try {
    const canvas = await html2canvas(div, { scale: 2, backgroundColor: '#f6f5f1', logging: false });

function avatarHtml(name, size) {

  const cls = size === 'lg' ? 'avatar-lg' : (size === 'sm' ? 'avatar-sm' : 'avatar');
  const phCls = size === 'lg' ? 'avatar-placeholder-lg' : ('avatar-placeholder ' + cls);
  if (photo) {
    return `<img class="${cls}" src="${photo}" alt="${escapeAttr(name)}" title="${escapeAttr(name)}">`;
  }
  const initials = name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('');
  return `<span class="${phCls}" title="${escapeAttr(name)}">${escapeHtml(initials)}</span>`;
}

async function pickPhoto(playerName) {
  return new Promise(resolve => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = async () => {
      const file = inp.files[0];
      if (!file) return resolve(null);
      const reader = new FileReader();
      reader.onload = e => {
        // Resize to max 200px to keep state small
        const img = new Image();
        img.onload = () => {
          const max = 200;
          const scale = Math.min(1, max / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };
    inp.click();
  });
}

// ============ SCORING ============
function pointsForBet(bet, result) {
  if (!result || result.homeScore == null || result.awayScore == null) return null;
  if (!bet || bet.h == null || bet.a == null) return 0;
  if (bet.h === result.homeScore && bet.a === result.awayScore) return 3;
  const sign = (a, b) => a > b ? 1 : (a < b ? -1 : 0);
  if (sign(bet.h, bet.a) === sign(result.homeScore, result.awayScore)) return 1;
  return 0;
}
function roundTotals(round) {
  const totals = {};
  for (const p of state.players) totals[p] = 0;
  if (!round) return totals;
  for (const p of Object.keys(round.bets || {})) {
    const bets = round.bets[p];
    let sum = 0;
    round.games.forEach((g, i) => {
      const pts = pointsForBet(bets[i], g);
      if (pts != null) sum += pts;
    });
    totals[p] = sum;
  }
  return totals;
}
function generalStandings() {
  const totals = {};
  for (const p of state.players) totals[p] = { pts: 0, exact: 0, played: 0 };
  for (const rid of Object.keys(state.rounds)) {
    const round = state.rounds[rid];
    const finished = round.games.length > 0 && round.games.every(g => g.homeScore != null && g.awayScore != null);
    if (!finished) continue;
    for (const p of Object.keys(round.bets || {})) {
      if (!totals[p]) totals[p] = { pts: 0, exact: 0, played: 0 };
      totals[p].played++;
      round.games.forEach((g, i) => {
        const pts = pointsForBet(round.bets[p][i], g);
        if (pts === 3) totals[p].exact++;
        totals[p].pts += pts || 0;
      });
    }
  }
  return Object.entries(totals)
    .map(([name, t]) => ({ name, ...t }))
    .sort((a, b) => b.pts - a.pts || b.exact - a.exact);
}
function allBetsSubmitted(round) {
  if (!round || state.players.length === 0 || round.games.length === 0) return false;
  return state.players.every(p => {
    const b = (round.bets || {})[p];
    return b && b.length === round.games.length && b.every(x => x && x.h != null && x.a != null);
  });
}

        <button class="btn" style="background:var(--accent)" onclick="doPlayerLogin()">Entrar</button>
        <div id="player-msg"></div>
      </div></div>`;
    }

    document.getElementById('content').innerHTML = html;
    return;
  }

  const round = state.rounds[state.currentRoundId];
  let html = '';

  html += `<section class="card">
    <h2>Jogadores</h2>
    <div class="sub">Quem participa no totobola</div>
    <div id="players-list">`;
  state.players.forEach(p => {
    const hasPhoto = state.playerPhotos && state.playerPhotos[p];
    const hasPin = state.playerPins && state.playerPins[p];
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:12px">
      <div style="display:flex;align-items:center;gap:10px">
        ${avatarHtml(p, 'sm')}
        <div>
          <div>${escapeHtml(p)}</div>
          <div class="small" style="margin-top:2px">${hasPin ? '🔑 PIN definido' : '⚠️ Sem PIN'}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button class="btn ghost" style="font-size:12px;padding:6px 12px" onclick="setPlayerPin('${escapeAttr(p)}')">${hasPin ? 'Alterar PIN' : 'Definir PIN'}</button>
        <button class="btn ghost" style="font-size:12px;padding:6px 12px" onclick="uploadPlayerPhoto('${escapeAttr(p)}')">${hasPhoto ? '🖼 Foto' : '📷 Foto'}</button>
        ${hasPhoto ? `<button class="btn ghost" style="font-size:12px;padding:6px 10px;color:var(--danger)" onclick="removePlayerPhoto('${escapeAttr(p)}')">✕</button>` : ''}
        <button class="btn ghost" style="font-size:12px;padding:6px 12px" onclick="removePlayer('${escapeAttr(p)}')">Remover</button>
      </div>
    </div>`;
  });
  html += `</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <input id="newplayer" placeholder="Nome do jogador" onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="btn" onclick="addPlayer()">Adicionar</button>
    </div>
  </section>`;

  html += `<section class="card">
    <h2>Jornadas</h2>
    <div class="sub">Gerir jornadas existentes</div>
    <label>Jornada atual (visível na página principal)</label>
    <select id="current-select" onchange="setCurrent(this.value)">
      <option value="">— nenhuma —</option>`;
  Object.values(state.rounds).forEach(r => {
    html += `<option value="${escapeAttr(r.id)}" ${r.id === state.currentRoundId ? 'selected' : ''}>${escapeHtml(r.name)}</option>`;
  });
  html += `</select>
    <div style="height:14px"></div>
    <label>Criar nova jornada</label>
    <div style="display:flex;gap:8px">
      <input id="new-round-name" placeholder="ex.: Jornada 12" onkeydown="if(event.key==='Enter')createRound()">
      <button class="btn accent" onclick="createRound()">Criar</button>
    </div>
  </section>`;

  if (round) {
    html += `<section class="card">
      <h2>Editar ${escapeHtml(round.name)}</h2>
      <div class="sub">Jogos, resultados e apostas</div>
      <label>Jogos da jornada</label>
      <div id="games-list">`;
    round.games.forEach((g, i) => {
      html += `<div class="field-row">
        <input value="${escapeAttr(g.home)}" onchange="updateGame(${i},'home',this.value)" placeholder="Casa">
        <div class="vs">vs</div>
        <input value="${escapeAttr(g.away)}" onchange="updateGame(${i},'away',this.value)" placeholder="Fora">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 30px;gap:8px;margin-bottom:14px">
        <input type="date" value="${g.date||''}" onchange="updateGame(${i},'date',this.value)" title="Dia do jogo">
        <input type="time" value="${g.time||''}" onchange="updateGame(${i},'time',this.value)" title="Hora do jogo">
        <div></div>
      </div>`;
    });
    html += `</div>
      <div class="toolbar">
        <button class="btn ghost" onclick="addGame()">+ Adicionar jogo</button>
        ${round.games.length > 0 ? `<button class="btn ghost" onclick="removeLastGame()">– Remover último</button>` : ''}
      </div>`;

    if (round.games.length > 0) {
      html += `<div style="height:24px"></div><label>Resultados finais</label>`;
      round.games.forEach((g, i) => {
        html += `<div class="score-row">
          <div class="lbl l">${escapeHtml(g.home)}</div>
          <input type="number" min="0" value="${g.homeScore ?? ''}" onchange="updateScore(${i},'homeScore',this.value)">
          <div class="x">–</div>
          <input type="number" min="0" value="${g.awayScore ?? ''}" onchange="updateScore(${i},'awayScore',this.value)">
          <div class="lbl">${escapeHtml(g.away)}</div>
          <div></div>
        </div>`;
      });
    }

    if (state.players.length > 0 && round.games.length > 0) {
      html += `<div style="height:24px"></div><label>Apostas dos jogadores</label>`;
      state.players.forEach(p => {
        const bets = (round.bets || {})[p] || [];
        const filled = bets.filter(b => b && b.h != null && b.a != null).length;
        html += `<details class="player-block">
          <summary>${escapeHtml(p)} <span class="pill ${filled === round.games.length ? '' : 'muted'}">${filled}/${round.games.length}</span></summary>
          <div style="margin-top:12px">`;
        round.games.forEach((g, i) => {
          const b = bets[i] || {};
          html += `<div class="score-row">
            <div class="lbl l">${escapeHtml(g.home)}</div>
            <input type="number" min="0" value="${b.h ?? ''}" onchange="updateBet('${escapeAttr(p)}',${i},'h',this.value)">
            <div class="x">–</div>
            <input type="number" min="0" value="${b.a ?? ''}" onchange="updateBet('${escapeAttr(p)}',${i},'a',this.value)">
            <div class="lbl">${escapeHtml(g.away)}</div>
            <div></div>
          </div>`;
        });
        html += `</div></details>`;
      });
    }

    html += `<div class="danger-zone">
      <button class="btn danger" onclick="deleteRound('${escapeAttr(round.id)}')">Apagar esta jornada</button>
    </div>
    </section>`;
  }

  html += `<section class="card">
    <h2>Conta</h2>
    <div class="sub">Gestão de acesso</div>
    <div class="toolbar">
      <button class="btn ghost" onclick="changePassword()">Mudar password</button>
      <button class="btn ghost" onclick="logout()">Terminar sessão</button>
    </div>
  </section>`;

  document.getElementById('content').innerHTML = html;
}

// ============ ADMIN ACTIONS ============
async function doLogin() {
  const v = document.getElementById('pwd').value;
  try {
    const stored = await kvGet(PWD_KEY);
    const hash = await sha256(v);
    if (hash === stored) { isAdmin = true; renderAdmin(); }
    else { document.getElementById('msg').innerHTML = '<div class="err">Password incorreta.</div>'; }
  } catch (e) {
    document.getElementById('msg').innerHTML = '<div class="err">Erro: ' + e.message + '</div>';
  }
}
async function doSetPassword() {
  const v = document.getElementById('newpwd').value.trim();
  if (v.length < 4) { document.getElementById('msg').innerHTML = '<div class="err">Mínimo 4 caracteres.</div>'; return; }
  try {
    const hash = await sha256(v);
    await kvSet(PWD_KEY, hash);
    isAdmin = true;
    showToast('Password definida.');
    renderAdmin();
  } catch (e) {
    document.getElementById('msg').innerHTML = '<div class="err">Erro: ' + e.message + '</div>';
  }
}
async function changePassword() {
  const v = prompt('Nova password (mínimo 4 caracteres):');
  if (v && v.trim().length >= 4) {
    const hash = await sha256(v.trim());
    await kvSet(PWD_KEY, hash);
    showToast('Password atualizada.');
  }
}
function logout() { isAdmin = false; renderAdmin(); }

async function addPlayer() {
  const v = document.getElementById('newplayer').value.trim();
  if (!v || state.players.includes(v)) return;
  state.players.push(v);
  await saveState();
  renderAdmin();
}
async function removePlayer(name) {
  if (!confirm('Remover jogador "' + name + '"? As suas apostas serão também removidas.')) return;
  state.players = state.players.filter(p => p !== name);
  for (const rid of Object.keys(state.rounds)) {
    if (state.rounds[rid].bets) delete state.rounds[rid].bets[name];
  }
  await saveState();
  renderAdmin();
}
async function createRound() {
  const name = document.getElementById('new-round-name').value.trim();
  if (!name) return;
  const id = 'r' + Date.now();
  state.rounds[id] = { id, name, games: [], bets: {} };
  if (!state.currentRoundId) state.currentRoundId = id;
  await saveState();
  renderAdmin();
}
async function setCurrent(id) {
  state.currentRoundId = id || null;
  await saveState();
  renderAdmin();
}
async function deleteRound(id) {
  if (!confirm('Apagar jornada definitivamente?')) return;
  delete state.rounds[id];
  if (state.currentRoundId === id) state.currentRoundId = null;
  await saveState();
  renderAdmin();
}
async function addGame() {
  const r = state.rounds[state.currentRoundId];
  r.games.push({ home: '', away: '', date: '', time: '', homeScore: null, awayScore: null });
  for (const p of Object.keys(r.bets || {})) r.bets[p].push({ h: null, a: null });
  await saveState();
  renderAdmin();
}
async function removeLastGame() {
  const r = state.rounds[state.currentRoundId];
  r.games.pop();
  for (const p of Object.keys(r.bets || {})) r.bets[p].pop();
  await saveState();
  renderAdmin();
}
async function updateGame(i, field, val) {
  state.rounds[state.currentRoundId].games[i][field] = val;
  await saveState();
}
async function updateScore(i, field, val) {
  const v = val === '' ? null : parseInt(val, 10);
  state.rounds[state.currentRoundId].games[i][field] = isNaN(v) ? null : v;
  await saveState();
}
async function updateBet(player, i, field, val) {
  const r = state.rounds[state.currentRoundId];
  if (!r.bets) r.bets = {};
  if (!r.bets[player]) r.bets[player] = r.games.map(() => ({ h: null, a: null }));
  while (r.bets[player].length < r.games.length) r.bets[player].push({ h: null, a: null });
  const v = val === '' ? null : parseInt(val, 10);
  r.bets[player][i][field] = isNaN(v) ? null : v;
  await saveState();
}

// ============ PLAYER SESSION ============
async function setPlayerPin(name) {
  const pin = prompt(`PIN para ${name} (4-10 dígitos, partilha por privado):`);
  if (!pin || pin.trim().length < 4) { if (pin !== null) alert('Mínimo 4 caracteres.'); return; }
  if (!state.playerPins) state.playerPins = {};
  state.playerPins[name] = await sha256(pin.trim());
  await saveState();
  renderAdmin();
  showToast(`PIN de ${name} guardado.`);
}

async function doPlayerLogin() {
  const name = document.getElementById('player-select').value;
  const pin = document.getElementById('player-pin').value;
  if (!name) { document.getElementById('player-msg').innerHTML = '<div class="err">Escolhe o teu nome.</div>'; return; }
  if (!pin) { document.getElementById('player-msg').innerHTML = '<div class="err">Introduz o teu PIN.</div>'; return; }
  const hash = await sha256(pin);
  if (hash !== (state.playerPins || {})[name]) {
    document.getElementById('player-msg').innerHTML = '<div class="err">PIN incorreto.</div>';
    return;
  }
  currentPlayerSession = name;
  updatePlayerBanner();
  switchTab('mybets');
}

function logoutPlayer() {
  currentPlayerSession = null;
  updatePlayerBanner();
  switchTab('main');
}

function updatePlayerBanner() {
  const banner = document.getElementById('player-banner');
  const nameEl = document.getElementById('player-banner-name');
  const mybetsBtn = document.getElementById('tab-mybets');
  if (currentPlayerSession) {
    banner.style.display = 'flex';
    nameEl.innerHTML = `${avatarHtml(currentPlayerSession,'sm')} <strong style="margin-left:8px">${escapeHtml(currentPlayerSession)}</strong> — sessão ativa`;
    mybetsBtn.style.display = '';
    document.querySelector('.wrap').style.paddingBottom = '80px';
  } else {
    banner.style.display = 'none';
    mybetsBtn.style.display = 'none';
    document.querySelector('.wrap').style.paddingBottom = '';
  }
}

// ============ RENDER MY BETS ============
// Returns true if the first game of the round has already kicked off
function roundIsLocked(round) {
  if (!round || round.games.length === 0) return false;
  const gamesWithDate = round.games.filter(g => g.date);
  if (gamesWithDate.length === 0) return false;
  gamesWithDate.sort((a, b) => {
    const da = new Date(`${a.date}T${a.time || '00:00'}`);
    const db = new Date(`${b.date}T${b.time || '00:00'}`);
    return da - db;
  });
  const first = gamesWithDate[0];
  const kickoff = new Date(`${first.date}T${first.time || '00:00'}`);
  return Date.now() >= kickoff.getTime() - 60000; // fecha 1 min antes
}

async function renderMyBets() {
  const name = currentPlayerSession;
  if (!name) { switchTab('main'); return; }
  const round = state.rounds[state.currentRoundId];

  let html = `<section class="card">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      ${avatarHtml(name, 'lg')}
      <div>
        <h2 style="margin:0 0 2px">${escapeHtml(name)}</h2>
        <div class="sub" style="margin:0">As minhas apostas</div>
      </div>
    </div>`;

  if (!round || round.games.length === 0) {
    html += `<div class="empty"><div class="big">Sem jornada ativa</div>O administrador ainda não criou a jornada atual.</div></section>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  const existingBets = ((round.bets || {})[name]) || [];
  const alreadyFull = existingBets.length === round.games.length && existingBets.every(b => b && b.h != null && b.a != null);
  const locked = roundIsLocked(round);

  // Countdown
  const kickoff = firstKickoff(round);
  if (kickoff) {
    html += `<div id="countdown-mybets" class="countdown-bar">
      <div>
        <div class="countdown-label">Fecho das apostas em</div>
        <div class="countdown-time">…</div>
      </div>
    </div>`;
  }

  html += `<h3 style="font-family:'Fraunces',serif;margin:0 0 4px">${escapeHtml(round.name)}</h3>
    <div class="sub">Insere o teu prognóstico para cada jogo</div>`;

  if (locked) {
    html += `<div style="background:#fbe4df;border-radius:10px;padding:14px 16px;margin-bottom:18px;color:var(--danger);font-weight:500">
      🔒 O primeiro jogo desta jornada já começou. As apostas estão fechadas.
    </div>`;
  } else if (alreadyFull) {
    html += `<div style="background:var(--accent-soft);border-radius:10px;padding:14px 16px;margin-bottom:18px;color:var(--accent);font-weight:500">
      ✅ Já submeteste as tuas apostas para esta jornada. Podes alterá-las até começar o primeiro jogo da jornada.
    </div>`;
  }

  html += `<div id="mybets-form">`;
  round.games.forEach((g, i) => {
    const b = existingBets[i] || {};
    const dateStr = g.date ? formatDate(g.date) : '';
    const timeStr = g.time ? ` ${g.time}` : '';
    html += `<div style="margin-bottom:16px;padding:14px;border:1px solid var(--line);border-radius:10px;background:#fafaf7">
      <div class="small" style="margin-bottom:8px">${dateStr}${timeStr}</div>
      <div class="score-row">
        <div class="lbl l">${escapeHtml(g.home)}</div>
        <input type="number" min="0" id="mb-${i}-h" value="${b.h ?? ''}" placeholder="—" style="text-align:center;padding:8px 4px" ${locked ? 'disabled' : ''}>
        <div class="x">–</div>
        <input type="number" min="0" id="mb-${i}-a" value="${b.a ?? ''}" placeholder="—" style="text-align:center;padding:8px 4px" ${locked ? 'disabled' : ''}>
        <div class="lbl">${escapeHtml(g.away)}</div>
        <div></div>
      </div>
    </div>`;
  });
  html += `</div>`;
  if (!locked) {
    html += `<div class="toolbar">
      <button class="btn accent" onclick="submitMyBets()">💾 Guardar apostas</button>
    </div>`;
  }
  html += `</section>`;

  // ── Historial próprio ──
  const ids = Object.keys(state.rounds).slice().reverse();
  const pastRounds = ids.filter(rid => {
    if (rid === state.currentRoundId) return false;
    const r = state.rounds[rid];
    const b = (r.bets || {})[name];
    return b && b.length === r.games.length && b.every(x => x && x.h != null && x.a != null);
  });

  if (pastRounds.length > 0) {
    let totalPts = 0, totalExact = 0;
    html += `<section class="card">
      <h2>O meu historial</h2>
      <div class="sub">Jornadas anteriores</div>`;
    pastRounds.forEach(rid => {
      const r = state.rounds[rid];
      const bets = r.bets[name];
      let roundPts = 0;
      let rows = '';
      bets.forEach((b, i) => {
        const g = r.games[i];
        if (!g) return;
        const pts = pointsForBet(b, g);
        if (pts === 3) totalExact++;
        if (pts != null) { roundPts += pts; totalPts += pts; }
        const has = g.homeScore != null && g.awayScore != null;
        let cls = '';
        if (pts === 3) cls = 'exact'; else if (pts === 1) cls = 'outcome'; else if (pts === 0) cls = 'miss';
        rows += `<tr>
          <td class="match">${escapeHtml(g.home)} – ${escapeHtml(g.away)}</td>
          <td>${has ? `${g.homeScore}–${g.awayScore}` : '—'}</td>
          <td class="bet ${cls}">${b.h}–${b.a}</td>
          <td>${pts != null ? pts : '—'}</td>
        </tr>`;
      });
      html += `<details class="player-block">
        <summary>${escapeHtml(r.name)} <span class="pill">${roundPts} pts</span></summary>
        <div style="margin-top:12px"><div class="bets-grid"><table>
          <thead><tr><th class="match">Jogo</th><th>Resultado</th><th>Aposta</th><th>Pts</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div></div>
      </details>`;
    });
    html += `<div style="display:flex;gap:20px;padding:14px 8px 0;border-top:1px solid var(--line);margin-top:8px">
      <div><div class="small">Total acumulado</div><div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600">${totalPts} pts</div></div>
      <div><div class="small">Exatos</div><div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--accent)">${totalExact}</div></div>
    </div></section>`;
  }

  document.getElementById('content').innerHTML = html;
  if (kickoff) renderCountdownBar(round, 'countdown-mybets');
}

async function submitMyBets() {
  const name = currentPlayerSession;
  const round = state.rounds[state.currentRoundId];
  if (!name || !round) return;

  // Double-check server-side lock
  if (roundIsLocked(round)) {
    showToast('🔒 Apostas fechadas — o primeiro jogo já começou.');
    renderMyBets();
    return;
  }

  if (!round.bets) round.bets = {};
  if (!round.bets[name]) round.bets[name] = round.games.map(() => ({ h: null, a: null }));
  while (round.bets[name].length < round.games.length) round.bets[name].push({ h: null, a: null });

  let allFilled = true;
  round.games.forEach((g, i) => {
    const hVal = document.getElementById(`mb-${i}-h`).value;
    const aVal = document.getElementById(`mb-${i}-a`).value;
    const h = hVal === '' ? null : parseInt(hVal, 10);
    const a = aVal === '' ? null : parseInt(aVal, 10);
    round.bets[name][i] = { h: isNaN(h) ? null : h, a: isNaN(a) ? null : a };
    if (h == null || a == null) allFilled = false;
  });

  await saveState();
  showToast(allFilled ? '✅ Apostas guardadas!' : '⚠️ Guardado (alguns jogos sem aposta)');
  renderMyBets();
}

// ============ HELPERS ============
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }
function formatDate(iso) {
  if (!iso) return '';
  const parts = iso.split('-'); // YYYY-MM-DD
  if (parts.length !== 3) return iso;
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${parseInt(parts[2],10)} ${months[parseInt(parts[1],10)-1]}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============ TABS ============
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tab-' + t);
  if (btn) btn.classList.add('active');
  rerender();
}
function rerender() {
  if (currentTab === 'main') renderMain();
  else if (currentTab === 'history') renderHistory();
  else if (currentTab === 'player') renderPlayer();
  else if (currentTab === 'mybets') renderMyBets();
  else renderAdmin();
}
document.getElementById('tab-main').onclick = () => switchTab('main');
document.getElementById('tab-history').onclick = () => switchTab('history');
document.getElementById('tab-mybets').onclick = () => switchTab('mybets');
document.getElementById('tab-admin').onclick = () => switchTab('admin');

// ============ INIT ============
(async function init() {
  if (!configOk) {
    document.getElementById('content').innerHTML = `<div class="config-error">
      <h2>⚙️ Configuração necessária</h2>
      <p>Edita o ficheiro <code>index.html</code> e substitui as constantes <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> pelos valores do teu projeto Supabase.</p>
      <p class="small">Vê o <code>README.md</code> para o passo a passo.</p>
    </div>`;
    return;
  }

  await loadState();
  renderMain();

  // Realtime: refresh when data changes from another user
  sb.channel('kv-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kv_store', filter: `key=eq.${STATE_KEY}` }, async () => {
      await loadState();
      if (currentTab !== 'admin' || !isAdmin) {
        if (currentTab !== 'mybets') rerender(); // don't interrupt active bet entry
      }
    })
    .subscribe();
})();
</script>
