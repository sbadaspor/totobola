<title>Totobola entre Amigos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f6f5f1;
    --surface: #ffffff;
    --ink: #14140f;
    --muted: #6b6960;
    --line: #e6e3da;
    --accent: #1e5b3a;
    --accent-soft: #e8f0ea;
    --gold: #c89b3c;
    --danger: #b3361f;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(20,20,15,.04), 0 8px 24px rgba(20,20,15,.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .brand {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.02em;
  }
  .brand .dot { color: var(--accent); }
  .brand small {
    display: block; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-top: 2px;
  }
  nav.tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
  nav.tabs button {
    border: 0; background: transparent; padding: 8px 16px; border-radius: 999px;
    font: inherit; font-weight: 500; color: var(--muted); cursor: pointer;
  }
  nav.tabs button.active { background: var(--ink); color: #fff; }

  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px 24px; margin-bottom: 20px;
  }
  .card h2 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; margin: 0 0 4px; letter-spacing: -0.01em;
  }
  .card .sub {
    font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 18px;
  }
  .row-head, .row {
    display: grid; align-items: center; gap: 12px; padding: 12px 8px; border-bottom: 1px solid var(--line);
  }
  .row-head {
    font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); border-bottom: 1px solid var(--ink);
  }
  .row:last-child { border-bottom: 0; }

  .standings .row-head, .standings .row { grid-template-columns: 40px 1fr 80px 80px 80px; }
  .standings .pts { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; text-align: right; }
  .rank { font-family: 'Fraunces', serif; font-size: 18px; color: var(--muted); }
  .rank.top { color: var(--gold); }
  .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }

  .games .row-head, .games .row { grid-template-columns: 70px 1fr 100px 1fr; }
  .games .row { padding: 14px 8px; }
  .games .gdate { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-variant-numeric: tabular-nums; }
  .games .home { text-align: right; font-weight: 500; }
  .games .away { text-align: left; font-weight: 500; }
  .games .score {
    text-align: center; font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px;
    background: var(--accent-soft); color: var(--accent); padding: 4px 10px; border-radius: 8px;
  }
  .games .score.empty { background: transparent; color: var(--muted); font-weight: 400; font-style: italic; font-family: 'Inter', sans-serif; font-size: 13px; }

  .bets-grid { overflow-x: auto; }
  .bets-grid table { width: 100%; border-collapse: collapse; min-width: 500px; }
  .bets-grid th, .bets-grid td { padding: 10px 8px; text-align: center; border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
  .bets-grid th { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--ink); }
  .bets-grid td.match { text-align: left; font-size: 12px; color: var(--muted); }
  .bets-grid td.bet { font-family: 'Fraunces', serif; font-weight: 500; }
  .bets-grid td.bet.exact { background: var(--accent-soft); color: var(--accent); border-radius: 6px; }
  .bets-grid td.bet.outcome { background: #fff5d9; color: #7a5a00; border-radius: 6px; }
  .bets-grid td.bet.miss { background: #fbe4df; color: var(--danger); border-radius: 6px; }
  .bets-grid tfoot td { font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; padding-top: 14px; border-bottom: 0; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-style: italic; }
  .empty .big { font-family: 'Fraunces', serif; font-size: 18px; font-style: normal; color: var(--ink); margin-bottom: 6px; }

  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  input, select, textarea {
    width: 100%; font: inherit; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 8px; background: #fafaf7;
    color: var(--ink); transition: border .15s;
  }
  input:focus, select:focus, textarea:focus { outline: 0; border-color: var(--accent); background: #fff; }
  input[type=number] { -moz-appearance: textfield; }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  button.btn {
    background: var(--ink); color: #fff; border: 0; padding: 10px 18px;
    border-radius: 8px; font: inherit; font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  button.btn:hover { opacity: .85; }
  button.btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  button.btn.danger { background: var(--danger); }
  button.btn.accent { background: var(--accent); }

  .field-row { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .field-row .vs { text-align: center; color: var(--muted); font-size: 11px; }
  .score-row { display: grid; grid-template-columns: 1fr 50px 14px 50px 1fr 30px; gap: 6px; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .score-row .lbl { color: var(--muted); }
  .score-row .lbl.l { text-align: right; }
  .score-row .x { text-align: center; color: var(--muted); }
  .score-row input { text-align: center; padding: 6px 4px; }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; background: var(--accent-soft); color: var(--accent); margin-left: 8px; }
  .pill.muted { background: var(--line); color: var(--muted); }

  details.player-block { border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; background: #fafaf7; }
  details.player-block summary { cursor: pointer; font-weight: 500; outline: 0; }
  details.player-block[open] { background: #fff; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .small { font-size: 12px; color: var(--muted); }
  .danger-zone { border-top: 1px dashed var(--line); margin-top: 24px; padding-top: 16px; }

  .login-box { max-width: 380px; margin: 40px auto; }
  .login-box .card { text-align: center; }
  .err { color: var(--danger); font-size: 13px; margin-top: 8px; }
  .ok { color: var(--accent); font-size: 13px; margin-top: 8px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: 13px; box-shadow: var(--shadow); opacity: 0; transition: opacity .2s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .config-error {
    max-width: 600px; margin: 60px auto; background: #fff; border: 2px solid var(--danger);
    border-radius: var(--radius); padding: 24px;
  }
  .config-error h2 { color: var(--danger); margin-top: 0; }
  .config-error code { background: #f6f5f1; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  @media (max-width: 640px) {
    .wrap { padding: 18px 12px 60px; }
    .brand { font-size: 22px; }
    header.top { margin-bottom: 18px; }
    nav.tabs { width: 100%; justify-content: space-around; }
    nav.tabs button { padding: 8px 12px; flex: 1; font-size: 13px; }
    .card { padding: 16px 14px; }
    .card h2 { font-size: 17px; }
    .standings .row-head, .standings .row { grid-template-columns: 26px 1fr 50px 50px 60px; font-size: 12px; gap: 6px; padding: 10px 4px; }
    .standings .pts { font-size: 15px; }
    .rank { font-size: 15px; }
    .games .row-head, .games .row { grid-template-columns: 46px 1fr 70px 1fr; gap: 4px; padding: 10px 4px; font-size: 13px; }
    .games .gdate { font-size: 10px; }
    .games .score { font-size: 14px; padding: 3px 6px; }
    .avatar { width: 28px; height: 28px; font-size: 12px; }
    .bets-grid th, .bets-grid td { padding: 8px 4px; font-size: 12px; }
    .bets-grid td.match { font-size: 11px; }
    .field-row { grid-template-columns: 1fr 40px 1fr; gap: 6px; }
    .field-row .vs { font-size: 10px; }
    .score-row { grid-template-columns: 1fr 44px 14px 44px 1fr 20px; gap: 4px; font-size: 12px; }
    .score-row input { padding: 6px 2px; font-size: 13px; }
    .login-box { margin: 20px auto; }
    button.btn { padding: 10px 14px; font-size: 13px; }
    details.player-block { padding: 10px 12px; }
  }
  @media (max-width: 400px) {
    .brand small { font-size: 10px; }
    .standings .row-head, .standings .row { grid-template-columns: 22px 1fr 40px 44px 50px; font-size: 11px; }
    .games .row-head, .games .row { grid-template-columns: 40px 1fr 62px 1fr; font-size: 12px; }
    .score-row { grid-template-columns: 1fr 38px 12px 38px 1fr 0; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dnNlcXBueGRlZGR1ZHN5Ymp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjI1NTcsImV4cCI6MjA5MTczODU1N30.8S9Lap0HNSHI-B39JksmTZeKuzh-QEG64K9g5x-icRU';

// ============ INIT SUPABASE ============
let sb = null;
let configOk = SUPABASE_URL && SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

// ============ STORAGE LAYER ============
const STATE_KEY = 'app_state';
const PWD_KEY = 'admin_pwd_hash';

async function kvGet(key) {
  const { data, error } = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
  if (error) throw error;
  return data ? data.value : null;
}
async function kvSet(key, value) {
  const { error } = await sb.from('kv_store').upsert({ key, value, updated_at: new Date().toISOString() });
  if (error) throw error;
}

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============ STATE ============
let state = { currentRoundId: null, rounds: {}, players: [] };
let isAdmin = false;
let currentTab = 'main';

async function loadState() {
  try {
    const v = await kvGet(STATE_KEY);
    if (v) state = v;
    migratePlayers();
  } catch (e) {
    console.error('loadState error', e);
    showToast('Erro ao carregar dados: ' + e.message);
  }
}
async function saveState() {
  try {
    await kvSet(STATE_KEY, state);
  } catch (e) {
    console.error('saveState error', e);
    showToast('Erro ao guardar: ' + e.message);
  }
}

// ============ SCORING ============
function pointsForBet(bet, result) {
  if (!result || result.homeScore == null || result.awayScore == null) return null;
  if (!bet || bet.h == null || bet.a == null) return 0;
  if (bet.h === result.homeScore && bet.a === result.awayScore) return 3;
  const sign = (a, b) => a > b ? 1 : (a < b ? -1 : 0);
  if (sign(bet.h, bet.a) === sign(result.homeScore, result.awayScore)) return 1;
  return 0;
}
function roundTotals(round) {
  const totals = {};
  for (const p of playerNames()) totals[p] = 0;
  if (!round) return totals;
  for (const p of playerNames()) {
    const bets = (round.bets || {})[p] || [];
    let sum = 0;
    round.games.forEach((g, i) => {
      const pts = pointsForBet(bets[i], g);
      if (pts != null) sum += pts;
    });
    totals[p] = sum;
  }
  return totals;
}
function generalStandings() {
  const totals = {};
  for (const p of playerNames()) totals[p] = { pts: 0, exact: 0, played: 0 };
  for (const rid of Object.keys(state.rounds)) {
    const round = state.rounds[rid];
    const finished = round.games.length > 0 && round.games.every(g => g.homeScore != null && g.awayScore != null);
    if (!finished) continue;
    for (const p of playerNames()) {
      if (!totals[p]) totals[p] = { pts: 0, exact: 0, played: 0 };
      totals[p].played++;
      const bets = (round.bets || {})[p] || [];
      round.games.forEach((g, i) => {
        const pts = pointsForBet(bets[i], g);
        if (pts === 3) totals[p].exact++;
        totals[p].pts += pts || 0;
      });
    }
  }
  return Object.entries(totals)
    .map(([name, t]) => ({ name, ...t }))
    .sort((a, b) => b.pts - a.pts || b.exact - a.exact);
}
function hasFullBets(round, playerName) {
  if (!round) return false;
  const b = (round.bets || {})[playerName];
  return b && b.length === round.games.length && b.every(x => x && x.h != null && x.a != null);
}
function allBetsSubmitted(round) {
  if (!round || state.players.length === 0 || round.games.length === 0) return false;
  return playerNames().every(p => hasFullBets(round, p));
}

// ============ RENDER MAIN ============
function renderMain() {
  const round = state.rounds[state.currentRoundId];
  const standings = generalStandings();
  let html = '';

  // "A minha aposta" CTA block (topo)
  if (round && round.games.length > 0) {
    const locked = isRoundLocked(round);
    const dl = roundDeadline(round);
    html += `<section class="card" style="background:linear-gradient(135deg,#fff,#fafaf7)">
      <h2>A minha aposta</h2>
      <div class="sub">${locked ? 'Apostas encerradas' : (dl ? `Fecha às ${new Date(dl).toLocaleString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}` : 'Submete o teu palpite')}</div>
      <button class="btn accent" onclick="switchTab('mybet')" ${locked?'disabled style="opacity:.5;cursor:not-allowed"':''}>${locked?'Apostas fechadas':'Entrar / Editar a minha aposta'}</button>
    </section>`;
  }

  html += `<section class="card standings">
    <h2>Classificação Geral</h2>
    <div style="margin-bottom:18px"></div>`;
  if (standings.length === 0 || standings.every(s => s.played === 0)) {
    html += `<div class="empty"><div class="big">Ainda sem jornadas concluídas</div>A classificação aparece quando os primeiros resultados forem inseridos.</div>`;
  } else {
    html += `<div class="row-head"><div></div><div>Jogador</div><div class="num">Jornadas</div><div class="num">Exatos</div><div class="num">Pontos</div></div>`;
    standings.forEach((s, i) => {
      html += `<div class="row">
        <div class="rank ${i === 0 ? 'top' : ''}">${i + 1}</div>
        <div style="cursor:pointer;display:flex;align-items:center;gap:10px;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:3px" onclick="showPlayer('${escapeAttr(s.name)}')">${avatarHtml(s.name, 32)}<span>${escapeHtml(s.name)}</span></div>
        <div class="num">${s.played}</div>
        <div class="num">${s.exact}</div>
        <div class="pts">${s.pts}</div>
      </div>`;
    });
  }
  html += `</section>`;

  html += `<section class="card games">
    <h2>Jornada Atual ${round ? `<span class="pill">${escapeHtml(round.name)}</span>` : ''}</h2>
    <div class="sub">Jogos e resultados</div>`;
  if (!round || round.games.length === 0) {
    html += `<div class="empty"><div class="big">Sem jornada definida</div>O administrador ainda não criou a jornada atual.</div>`;
  } else {
    html += `<div class="row-head"><div>Dia</div><div style="text-align:right">Casa</div><div style="text-align:center">Resultado</div><div>Fora</div></div>`;
    round.games.forEach(g => {
      const has = g.homeScore != null && g.awayScore != null;
      const dateStr = g.date ? formatDate(g.date) : '';
      const timeStr = g.time || '';
      const scoreContent = has
        ? `${g.homeScore} – ${g.awayScore}`
        : (timeStr ? timeStr : 'por jogar');
      html += `<div class="row">
        <div class="gdate">${dateStr}</div>
        <div class="home">${escapeHtml(g.home)}</div>
        <div class="score ${has ? '' : 'empty'}">${scoreContent}</div>
        <div class="away">${escapeHtml(g.away)}</div>
      </div>`;
    });
  }
  html += `</section>`;

  if (round && round.games.length > 0) {
    const locked = isRoundLocked(round);
    html += `<section class="card">
      <h2>Apostas dos Jogadores</h2>
      <div class="sub">Jornada atual</div>`;
    if (!locked) {
      const names = playerNames();
      const submitted = names.filter(p => hasFullBets(round, p)).length;
      const dl = roundDeadline(round);
      const dlStr = dl ? new Date(dl).toLocaleString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      html += `<div class="empty"><div class="big">🔒 Apostas ocultas</div>As apostas ficam visíveis quando começar o primeiro jogo${dlStr?` (${dlStr})`:''}.<br><span class="small">${submitted} de ${names.length} jogadores submeteram.</span></div>`;
    } else {
      const totals = roundTotals(round);
      const names = playerNames();
      html += `<div class="bets-grid"><table><thead><tr><th class="match">Jogo</th>`;
      names.forEach(p => html += `<th><div style="display:flex;flex-direction:column;align-items:center;gap:4px">${avatarHtml(p, 28)}<span>${escapeHtml(p)}</span></div></th>`);
      html += `</tr></thead><tbody>`;
      round.games.forEach((g, i) => {
        html += `<tr><td class="match">${escapeHtml(g.home)} – ${escapeHtml(g.away)}</td>`;
        names.forEach(p => {
          const b = ((round.bets||{})[p]||[])[i];
          if (!b || b.h == null || b.a == null) {
            html += `<td class="bet miss">—</td>`;
            return;
          }
          const pts = pointsForBet(b, g);
          let cls = '';
          if (pts === 3) cls = 'exact';
          else if (pts === 1) cls = 'outcome';
          else if (pts === 0) cls = 'miss';
          html += `<td class="bet ${cls}">${b.h}–${b.a}</td>`;
        });
        html += `</tr>`;
      });
      html += `</tbody><tfoot><tr><td class="match">Total</td>`;
      names.forEach(p => html += `<td>${totals[p]}</td>`);
      html += `</tr></tfoot></table></div>
      <div class="small" style="margin-top:10px">Jogadores sem apostas submetidas a tempo contam 0 pontos.</div>`;
    }
    html += `</section>`;
  }

  if (round && state.players.length > 0 && isRoundLocked(round)) {
    const totals = roundTotals(round);
    const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    html += `<section class="card standings">
      <h2>Resultados da Jornada Atual</h2>
      <div class="sub">Pontuação obtida nesta jornada</div>
      <div class="row-head"><div></div><div>Jogador</div><div></div><div></div><div class="num">Pontos</div></div>`;
    sorted.forEach(([name, pts], i) => {
      html += `<div class="row">
        <div class="rank ${i === 0 ? 'top' : ''}">${i + 1}</div>
        <div style="display:flex;align-items:center;gap:10px">${avatarHtml(name, 32)}<span>${escapeHtml(name)}</span></div>
        <div></div><div></div>
        <div class="pts">${pts}</div>
      </div>`;
    });
    html += `</section>`;
  }

  document.getElementById('content').innerHTML = html;
}

// ============ RENDER PLAYER DETAIL ============
let selectedPlayer = null;
function showPlayer(name) {
  selectedPlayer = name;
  currentTab = 'player';
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  renderPlayer();
}
function renderPlayer() {
  const name = selectedPlayer;
  let totalPts = 0, totalExact = 0, totalOutcome = 0, totalMiss = 0;
  let html = `<section class="card">
    <button class="btn ghost" onclick="switchTab('main')" style="margin-bottom:16px">← Voltar</button>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:4px">
      ${avatarHtml(name, 52)}
      <div>
        <h2 style="margin:0">${escapeHtml(name)}</h2>
        <div class="sub" style="margin:0">Histórico de apostas</div>
      </div>
    </div>`;

  const ids = Object.keys(state.rounds).slice().reverse();
  // Include every locked round (first game started) where the player exists
  const relevantRounds = ids.filter(rid => {
    const r = state.rounds[rid];
    return r.games.length > 0 && isRoundLocked(r);
  });

  if (relevantRounds.length === 0) {
    html += `<div class="empty"><div class="big">Sem apostas registadas</div>Ainda não há jornadas iniciadas.</div></section>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  let blocks = '';
  relevantRounds.forEach(rid => {
    const round = state.rounds[rid];
    const bets = (round.bets || {})[name] || [];
    const submitted = hasFullBets(round, name);
    let roundPts = 0;
    let rows = '';
    round.games.forEach((g, i) => {
      const b = bets[i] || {};
      const has = g.homeScore != null && g.awayScore != null;
      if (!b || b.h == null || b.a == null) {
        if (has) totalMiss++;
        rows += `<tr>
          <td class="match">${escapeHtml(g.home)} – ${escapeHtml(g.away)}</td>
          <td>${has ? `${g.homeScore}–${g.awayScore}` : '—'}</td>
          <td class="bet miss" title="Não apostou">—</td>
          <td>0</td>
        </tr>`;
        return;
      }
      const pts = pointsForBet(b, g);
      let cls = 'miss';
      if (pts === 3) { cls = 'exact'; totalExact++; }
      else if (pts === 1) { cls = 'outcome'; totalOutcome++; }
      else if (pts === 0) { cls = 'miss'; totalMiss++; }
      else { cls = ''; }
      if (pts != null) { roundPts += pts; totalPts += pts; }
      rows += `<tr>
        <td class="match">${escapeHtml(g.home)} – ${escapeHtml(g.away)}</td>
        <td>${has ? `${g.homeScore}–${g.awayScore}` : '—'}</td>
        <td class="bet ${cls}">${b.h}–${b.a}</td>
        <td>${pts != null ? pts : '—'}</td>
      </tr>`;
    });
    const noBetBadge = submitted ? '' : '<span class="pill muted">não apostou</span>';
    blocks += `<details class="player-block" open>
      <summary>${escapeHtml(round.name)} ${noBetBadge} <span class="pill">${roundPts} pts</span></summary>
      <div style="margin-top:12px"><div class="bets-grid"><table>
        <thead><tr><th class="match">Jogo</th><th>Resultado</th><th>Aposta</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>
    </details>`;
  });

  html += `<div style="display:flex;gap:20px;flex-wrap:wrap;padding:14px 0;border-bottom:1px solid var(--line);margin-bottom:18px">
    <div><div class="small">Total</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:600">${totalPts} pts</div></div>
    <div><div class="small">Exatos</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--accent)">${totalExact}</div></div>
    <div><div class="small">V/E/D</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:#7a5a00">${totalOutcome}</div></div>
    <div><div class="small">Erros</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--danger)">${totalMiss}</div></div>
  </div>${blocks}</section>`;
  document.getElementById('content').innerHTML = html;
}

// ============ MY BET (player self-submit) ============
let loggedPlayer = null;
function renderMyBet() {
  const round = state.rounds[state.currentRoundId];
  if (!round || round.games.length === 0) {
    document.getElementById('content').innerHTML = `<section class="card">
      <button class="btn ghost" onclick="switchTab('main')" style="margin-bottom:16px">← Voltar</button>
      <div class="empty"><div class="big">Sem jornada ativa</div>Ainda não há jogos para apostar.</div>
    </section>`;
    return;
  }
  const locked = isRoundLocked(round);

  // Login screen
  if (!loggedPlayer) {
    let html = `<section class="card" style="max-width:420px;margin:0 auto">
      <button class="btn ghost" onclick="switchTab('main')" style="margin-bottom:16px">← Voltar</button>
      <h2>A minha aposta</h2>
      <div class="sub">Identifica-te para submeter</div>
      <label>Jogador</label>
      <select id="mb-name">
        <option value="">— escolhe o teu nome —</option>`;
    state.players.forEach(p => html += `<option value="${escapeAttr(p.name)}">${escapeHtml(p.name)}</option>`);
    html += `</select>
      <div style="height:12px"></div>
      <label>PIN</label>
      <input type="password" id="mb-pin" placeholder="PIN fornecido pelo admin" onkeydown="if(event.key==='Enter')playerLogin()">
      <div style="height:12px"></div>
      <button class="btn accent" onclick="playerLogin()">Entrar</button>
      <div id="mb-msg"></div>
    </section>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  // Bet editor for logged player
  const p = getPlayer(loggedPlayer);
  if (!p) { loggedPlayer = null; renderMyBet(); return; }
  const bets = (round.bets && round.bets[loggedPlayer]) || round.games.map(() => ({ h: null, a: null }));

  let html = `<section class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <button class="btn ghost" onclick="switchTab('main')">← Voltar</button>
      <button class="btn ghost" onclick="playerLogout()">Sair</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin:10px 0 4px">
      ${avatarHtml(p, 44)}
      <div>
        <h2 style="margin:0">${escapeHtml(p.name)}</h2>
        <div class="sub" style="margin:0">${escapeHtml(round.name)}</div>
      </div>
    </div>`;

  if (locked) {
    html += `<div class="empty" style="padding:24px 12px"><div class="big">🔒 Apostas encerradas</div>O prazo de submissão já terminou.</div>
      <div style="margin-top:8px">`;
    round.games.forEach((g, i) => {
      const b = bets[i] || {};
      const filled = b.h != null && b.a != null;
      html += `<div class="score-row" style="opacity:.7">
        <div class="lbl l">${escapeHtml(g.home)}</div>
        <input type="number" value="${b.h??''}" disabled>
        <div class="x">–</div>
        <input type="number" value="${b.a??''}" disabled>
        <div class="lbl">${escapeHtml(g.away)}</div>
        <div></div>
      </div>`;
    });
    html += `</div>`;
  } else {
    const dl = roundDeadline(round);
    if (dl) html += `<div class="small" style="margin-bottom:14px">Fecha às ${new Date(dl).toLocaleString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`;
    round.games.forEach((g, i) => {
      const b = bets[i] || {};
      const dateStr = g.date ? formatDate(g.date) : '';
      const timeStr = g.time || '';
      html += `<div class="score-row">
        <div class="lbl l">${escapeHtml(g.home)}<div style="font-size:10px;color:var(--muted)">${dateStr} ${timeStr}</div></div>
        <input type="number" min="0" value="${b.h??''}" onchange="updateMyBet(${i},'h',this.value)">
        <div class="x">–</div>
        <input type="number" min="0" value="${b.a??''}" onchange="updateMyBet(${i},'a',this.value)">
        <div class="lbl">${escapeHtml(g.away)}</div>
        <div></div>
      </div>`;
    });
    html += `<div class="small" style="margin-top:14px">Alterações são guardadas automaticamente.</div>`;
  }

  html += `</section>`;
  document.getElementById('content').innerHTML = html;
}

async function playerLogin() {
  const name = document.getElementById('mb-name').value;
  const pin = document.getElementById('mb-pin').value.trim();
  const msg = document.getElementById('mb-msg');
  if (!name) { msg.innerHTML = '<div class="err">Escolhe o teu nome.</div>'; return; }
  const p = getPlayer(name);
  if (!p) { msg.innerHTML = '<div class="err">Jogador não encontrado.</div>'; return; }
  if (!p.pin) { msg.innerHTML = '<div class="err">O admin ainda não definiu um PIN para ti.</div>'; return; }
  if (p.pin !== pin) { msg.innerHTML = '<div class="err">PIN incorreto.</div>'; return; }
  loggedPlayer = name;
  renderMyBet();
}
function playerLogout() { loggedPlayer = null; switchTab('main'); }

async function updateMyBet(i, field, val) {
  const round = state.rounds[state.currentRoundId];
  if (isRoundLocked(round)) { showToast('Apostas encerradas.'); return; }
  if (!round.bets) round.bets = {};
  if (!round.bets[loggedPlayer]) round.bets[loggedPlayer] = round.games.map(() => ({ h: null, a: null }));
  while (round.bets[loggedPlayer].length < round.games.length) round.bets[loggedPlayer].push({ h: null, a: null });
  const v = val === '' ? null : parseInt(val, 10);
  round.bets[loggedPlayer][i][field] = isNaN(v) ? null : v;
  await saveState();
  showToast('Guardado');
}

// ============ RENDER HISTORY ============
function renderHistory() {
  const ids = Object.keys(state.rounds);
  let html = `<section class="card">
    <h2>Histórico de Jornadas</h2>
    <div class="sub">Resultados e apostas anteriores</div>`;
  if (ids.length === 0) {
    html += `<div class="empty"><div class="big">Sem histórico ainda</div>Nenhuma jornada foi criada.</div>`;
  } else {
    ids.slice().reverse().forEach(rid => {
      const round = state.rounds[rid];
      const isCurrent = rid === state.currentRoundId;
      const finished = round.games.length > 0 && round.games.every(g => g.homeScore != null && g.awayScore != null);
      const totals = roundTotals(round);
      html += `<details class="player-block" ${isCurrent ? 'open' : ''}>
        <summary>${escapeHtml(round.name)} ${isCurrent ? '<span class="pill">atual</span>' : ''} ${finished ? '' : '<span class="pill muted">em curso</span>'}</summary>
        <div style="margin-top:14px">`;
      if (round.games.length === 0) {
        html += `<div class="small">Sem jogos.</div>`;
      } else if (!isRoundLocked(round)) {
        const names = playerNames();
        const submitted = names.filter(p => hasFullBets(round, p)).length;
        const dl = roundDeadline(round);
        const dlStr = dl ? new Date(dl).toLocaleString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
        html += `<div class="bets-grid"><table><thead><tr><th class="match">Jogo</th><th>Resultado</th></tr></thead><tbody>`;
        round.games.forEach(g => {
          const has = g.homeScore != null && g.awayScore != null;
          html += `<tr><td class="match">${escapeHtml(g.home)} – ${escapeHtml(g.away)}</td><td>${has ? `${g.homeScore}–${g.awayScore}` : '—'}</td></tr>`;
        });
        html += `</tbody></table></div>
          <div class="empty" style="padding:20px 10px"><div class="big">🔒 Apostas ocultas</div>Ficam visíveis quando começar o primeiro jogo${dlStr?` (${dlStr})`:''}.<br><span class="small">${submitted} de ${names.length} jogadores submeteram.</span></div>`;
      } else {
        const names = playerNames();
        html += `<div class="bets-grid"><table><thead><tr><th class="match">Jogo</th><th>Resultado</th>`;
        names.forEach(p => html += `<th><div style="display:flex;flex-direction:column;align-items:center;gap:4px">${avatarHtml(p, 24)}<span>${escapeHtml(p)}</span></div></th>`);
        html += `</tr></thead><tbody>`;
        round.games.forEach((g, i) => {
          const has = g.homeScore != null && g.awayScore != null;
          html += `<tr><td class="match">${escapeHtml(g.home)} – ${escapeHtml(g.away)}</td><td>${has ? `${g.homeScore}–${g.awayScore}` : '—'}</td>`;
          names.forEach(p => {
            const b = ((round.bets||{})[p] || [])[i];
            if (!b || b.h == null || b.a == null) { html += `<td class="bet miss" title="Não apostou">—</td>`; return; }
            const pts = pointsForBet(b, g);
            let cls = '';
            if (pts === 3) cls = 'exact'; else if (pts === 1) cls = 'outcome'; else if (pts === 0) cls = 'miss';
            html += `<td class="bet ${cls}">${b.h}–${b.a}</td>`;
          });
          html += `</tr>`;
        });
        html += `</tbody><tfoot><tr><td class="match">Total</td><td></td>`;
        names.forEach(p => html += `<td>${totals[p] || 0}</td>`);
        html += `</tr></tfoot></table></div>
        <div class="small" style="margin-top:10px">Jogadores sem apostas submetidas a tempo contam 0 pontos nesta jornada.</div>`;
      }
      html += `</div></details>`;
    });
  }
  html += `</section>`;
  document.getElementById('content').innerHTML = html;
}

// ============ ADMIN ============
async function renderAdmin() {
  if (!isAdmin) {
    let stored = null;
    try { stored = await kvGet(PWD_KEY); } catch (e) { console.error(e); }

    let html = `<div class="login-box"><div class="card">
      <h2>Área de Administração</h2>
      <div class="sub">Acesso restrito</div>`;
    if (!stored) {
      html += `<p class="small">Primeira utilização: define a password de administrador.</p>
        <input type="password" id="newpwd" placeholder="Nova password (mín. 4 caracteres)" onkeydown="if(event.key==='Enter')doSetPassword()">
        <div style="height:8px"></div>
        <button class="btn accent" onclick="doSetPassword()">Definir password</button>
        <div id="msg"></div>`;
    } else {
      html += `<input type="password" id="pwd" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
        <div style="height:8px"></div>
        <button class="btn accent" onclick="doLogin()">Entrar</button>
        <div id="msg"></div>`;
    }
    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  const round = state.rounds[state.currentRoundId];
  let html = '';

  html += `<section class="card">
    <h2>Jogadores</h2>
    <div class="sub">Quem participa · PIN para submeter apostas · foto de perfil</div>
    <div id="players-list">`;
  state.players.forEach((p, idx) => {
    html += `<div style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap">
      ${avatarHtml(p, 44)}
      <div style="flex:1;min-width:140px">
        <div style="font-weight:500">${escapeHtml(p.name)}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
          <input type="text" placeholder="PIN" value="${escapeAttr(p.pin||'')}" style="max-width:120px;padding:6px 10px" onchange="updatePlayerPin(${idx}, this.value)">
          <label class="btn ghost" style="padding:6px 12px;cursor:pointer;margin:0">
            Foto
            <input type="file" accept="image/*" style="display:none" onchange="handleAvatarUpload(${idx}, this.files[0])">
          </label>
          ${p.avatar ? `<button class="btn ghost" style="padding:6px 12px" onclick="clearAvatar(${idx})">Limpar foto</button>` : ''}
        </div>
      </div>
      <button class="btn ghost" onclick="removePlayer('${escapeAttr(p.name)}')">Remover</button>
    </div>`;
  });
  html += `</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <input id="newplayer" placeholder="Nome do jogador" onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="btn" onclick="addPlayer()">Adicionar</button>
    </div>
  </section>`;

  html += `<section class="card">
    <h2>Jornadas</h2>
    <div class="sub">Gerir jornadas existentes</div>
    <label>Jornada atual (visível na página principal)</label>
    <select id="current-select" onchange="setCurrent(this.value)">
      <option value="">— nenhuma —</option>`;
  Object.values(state.rounds).forEach(r => {
    html += `<option value="${escapeAttr(r.id)}" ${r.id === state.currentRoundId ? 'selected' : ''}>${escapeHtml(r.name)}</option>`;
  });
  html += `</select>
    <div style="height:14px"></div>
    <label>Criar nova jornada</label>
    <div style="display:flex;gap:8px">
      <input id="new-round-name" placeholder="ex.: Jornada 12" onkeydown="if(event.key==='Enter')createRound()">
      <button class="btn accent" onclick="createRound()">Criar</button>
    </div>
  </section>`;

  if (round) {
    html += `<section class="card">
      <h2>Editar ${escapeHtml(round.name)}</h2>
      <div class="sub">Jogos, resultados e apostas</div>
      <label>Jogos da jornada</label>
      <div id="games-list">`;
    round.games.forEach((g, i) => {
      html += `<div class="field-row">
        <input value="${escapeAttr(g.home)}" onchange="updateGame(${i},'home',this.value)" placeholder="Casa">
        <div class="vs">vs</div>
        <input value="${escapeAttr(g.away)}" onchange="updateGame(${i},'away',this.value)" placeholder="Fora">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 30px;gap:8px;margin-bottom:14px">
        <input type="date" value="${g.date||''}" onchange="updateGame(${i},'date',this.value)" title="Dia do jogo">
        <input type="time" value="${g.time||''}" onchange="updateGame(${i},'time',this.value)" title="Hora do jogo">
        <div></div>
      </div>`;
    });
    html += `</div>
      <div class="toolbar">
        <button class="btn ghost" onclick="addGame()">+ Adicionar jogo</button>
        ${round.games.length > 0 ? `<button class="btn ghost" onclick="removeLastGame()">– Remover último</button>` : ''}
      </div>`;

    if (round.games.length > 0) {
      html += `<div style="height:24px"></div><label>Resultados finais</label>`;
      round.games.forEach((g, i) => {
        html += `<div class="score-row">
          <div class="lbl l">${escapeHtml(g.home)}</div>
          <input type="number" min="0" value="${g.homeScore ?? ''}" onchange="updateScore(${i},'homeScore',this.value)">
          <div class="x">–</div>
          <input type="number" min="0" value="${g.awayScore ?? ''}" onchange="updateScore(${i},'awayScore',this.value)">
          <div class="lbl">${escapeHtml(g.away)}</div>
          <div></div>
        </div>`;
      });
    }

    if (state.players.length > 0 && round.games.length > 0) {
      html += `<div style="height:24px"></div><label>Apostas dos jogadores</label>`;
      state.players.forEach(p => {
        const bets = (round.bets || {})[p.name] || [];
        const filled = bets.filter(b => b && b.h != null && b.a != null).length;
        html += `<details class="player-block">
          <summary style="display:flex;align-items:center;gap:10px">${avatarHtml(p, 28)}<span style="flex:1">${escapeHtml(p.name)}</span><span class="pill ${filled === round.games.length ? '' : 'muted'}">${filled}/${round.games.length}</span></summary>

        round.games.forEach((g, i) => {
          const b = bets[i] || {};
          html += `<div class="score-row">
            <div class="lbl l">${escapeHtml(g.home)}</div>
            <input type="number" min="0" value="${b.h ?? ''}" onchange="updateBet('${escapeAttr(p.name)}',${i},'h',this.value)">
            <div class="x">–</div>
            <input type="number" min="0" value="${b.a ?? ''}" onchange="updateBet('${escapeAttr(p.name)}',${i},'a',this.value)">
            <div class="lbl">${escapeHtml(g.away)}</div>
            <div></div>
          </div>`;
        });
        html += `</div></details>`;
      });
    }

    html += `<div class="danger-zone">
      <button class="btn danger" onclick="deleteRound('${escapeAttr(round.id)}')">Apagar esta jornada</button>
    </div>
    </section>`;
  }

  html += `<section class="card">
    <h2>Conta</h2>
    <div class="sub">Gestão de acesso</div>
    <div class="toolbar">
      <button class="btn ghost" onclick="changePassword()">Mudar password</button>
      <button class="btn ghost" onclick="logout()">Terminar sessão</button>
    </div>
  </section>`;

  document.getElementById('content').innerHTML = html;
}

// ============ ADMIN ACTIONS ============
async function doLogin() {
  const v = document.getElementById('pwd').value;
  try {
    const stored = await kvGet(PWD_KEY);
    const hash = await sha256(v);
    if (hash === stored) { isAdmin = true; renderAdmin(); }
    else { document.getElementById('msg').innerHTML = '<div class="err">Password incorreta.</div>'; }
  } catch (e) {
    document.getElementById('msg').innerHTML = '<div class="err">Erro: ' + e.message + '</div>';
  }
}
async function doSetPassword() {
  const v = document.getElementById('newpwd').value.trim();
  if (v.length < 4) { document.getElementById('msg').innerHTML = '<div class="err">Mínimo 4 caracteres.</div>'; return; }
  try {
    const hash = await sha256(v);
    await kvSet(PWD_KEY, hash);
    isAdmin = true;
    showToast('Password definida.');
    renderAdmin();
  } catch (e) {
    document.getElementById('msg').innerHTML = '<div class="err">Erro: ' + e.message + '</div>';
  }
}
async function changePassword() {
  const v = prompt('Nova password (mínimo 4 caracteres):');
  if (v && v.trim().length >= 4) {
    const hash = await sha256(v.trim());
    await kvSet(PWD_KEY, hash);
    showToast('Password atualizada.');
  }
}
function logout() { isAdmin = false; renderAdmin(); }

async function addPlayer() {
  const v = document.getElementById('newplayer').value.trim();
  if (!v || playerNames().includes(v)) return;
  state.players.push({ name: v, pin: '', avatar: '' });
  await saveState();
  renderAdmin();
}
async function removePlayer(name) {
  if (!confirm('Remover jogador "' + name + '"? As suas apostas serão também removidas.')) return;
  state.players = state.players.filter(p => p.name !== name);
  for (const rid of Object.keys(state.rounds)) {
    if (state.rounds[rid].bets) delete state.rounds[rid].bets[name];
  }
  await saveState();
  renderAdmin();
}
async function updatePlayerPin(idx, pin) {
  state.players[idx].pin = pin.trim();
  await saveState();
  showToast('PIN atualizado');
}
async function handleAvatarUpload(idx, file) {
  if (!file) return;
  showToast('A carregar foto…');
  try {
    const url = await uploadAvatar(state.players[idx].name, file);
    state.players[idx].avatar = url;
    await saveState();
    showToast('Foto atualizada');
    renderAdmin();
  } catch (e) {
    console.error(e);
    showToast('Erro: ' + e.message);
  }
}
async function clearAvatar(idx) {
  state.players[idx].avatar = '';
  await saveState();
  renderAdmin();
}
async function createRound() {
  const name = document.getElementById('new-round-name').value.trim();
  if (!name) return;
  const id = 'r' + Date.now();
  state.rounds[id] = { id, name, games: [], bets: {} };
  if (!state.currentRoundId) state.currentRoundId = id;
  await saveState();
  renderAdmin();
}
async function setCurrent(id) {
  state.currentRoundId = id || null;
  await saveState();
  renderAdmin();
}
async function deleteRound(id) {
  if (!confirm('Apagar jornada definitivamente?')) return;
  delete state.rounds[id];
  if (state.currentRoundId === id) state.currentRoundId = null;
  await saveState();
  renderAdmin();
}
async function addGame() {
  const r = state.rounds[state.currentRoundId];
  r.games.push({ home: '', away: '', date: '', time: '', homeScore: null, awayScore: null });
  for (const p of Object.keys(r.bets || {})) r.bets[p].push({ h: null, a: null });
  await saveState();
  renderAdmin();
}
async function removeLastGame() {
  const r = state.rounds[state.currentRoundId];
  r.games.pop();
  for (const p of Object.keys(r.bets || {})) r.bets[p].pop();
  await saveState();
  renderAdmin();
}
async function updateGame(i, field, val) {
  state.rounds[state.currentRoundId].games[i][field] = val;
  await saveState();
}
async function updateScore(i, field, val) {
  const v = val === '' ? null : parseInt(val, 10);
  state.rounds[state.currentRoundId].games[i][field] = isNaN(v) ? null : v;
  await saveState();
}
async function updateBet(player, i, field, val) {
  const r = state.rounds[state.currentRoundId];
  if (!r.bets) r.bets = {};
  if (!r.bets[player]) r.bets[player] = r.games.map(() => ({ h: null, a: null }));
  while (r.bets[player].length < r.games.length) r.bets[player].push({ h: null, a: null });
  const v = val === '' ? null : parseInt(val, 10);
  r.bets[player][i][field] = isNaN(v) ? null : v;
  await saveState();
}

// ============ HELPERS ============
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }
function formatDate(iso) {
  if (!iso) return '';
  const parts = iso.split('-'); // YYYY-MM-DD
  if (parts.length !== 3) return iso;
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${parseInt(parts[2],10)} ${months[parseInt(parts[1],10)-1]}`;
}

// Migrate old-format players (array of strings) to new format (array of objects)
function migratePlayers() {
  if (!Array.isArray(state.players)) state.players = [];
  state.players = state.players.map(p => typeof p === 'string' ? { name: p, pin: '', avatar: '' } : p);
}
function playerNames() { return state.players.map(p => p.name); }
function getPlayer(name) { return state.players.find(p => p.name === name); }

// Calculate round deadline: earliest date+time among the games
function roundDeadline(round) {
  if (!round || !round.games.length) return null;
  const ts = round.games
    .filter(g => g.date && g.time)
    .map(g => new Date(`${g.date}T${g.time}`).getTime())
    .filter(t => !isNaN(t));
  return ts.length ? Math.min(...ts) : null;
}
function isRoundLocked(round) {
  const dl = roundDeadline(round);
  return dl != null && Date.now() >= dl;
}

// Avatar rendering
function avatarHtml(player, size = 28) {
  const p = typeof player === 'string' ? getPlayer(player) : player;
  const name = p ? p.name : (typeof player === 'string' ? player : '');
  const url = p && p.avatar ? p.avatar : '';
  const initial = escapeHtml((name||'?').charAt(0).toUpperCase());
  const style = `width:${size}px;height:${size}px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:${Math.round(size*0.42)}px;flex-shrink:0;`;
  if (url) return `<img src="${escapeAttr(url)}" style="${style}object-fit:cover;background:var(--line)" alt="">`;
  return `<span style="${style}background:var(--accent-soft);color:var(--accent)">${initial}</span>`;
}

// Resize image in browser before upload
async function resizeImageFile(file, maxSize = 200) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Falha a processar imagem')), 'image/jpeg', 0.85);
    };
    img.onerror = () => reject(new Error('Ficheiro inválido'));
    img.src = URL.createObjectURL(file);
  });
}
async function uploadAvatar(playerName, file) {
  const blob = await resizeImageFile(file, 200);
  const path = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.jpg`;
  const { error } = await sb.storage.from('avatars').upload(path, blob, { contentType: 'image/jpeg', upsert: true });
  if (error) throw error;
  const { data } = sb.storage.from('avatars').getPublicUrl(path);
  return data.publicUrl;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============ TABS ============
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tab-' + t);
  if (btn) btn.classList.add('active');
  rerender();
}
function rerender() {
  if (currentTab === 'main') renderMain();
  else if (currentTab === 'history') renderHistory();
  else if (currentTab === 'player') renderPlayer();
  else if (currentTab === 'mybet') renderMyBet();
  else renderAdmin();
}
document.getElementById('tab-main').onclick = () => switchTab('main');
document.getElementById('tab-history').onclick = () => switchTab('history');
document.getElementById('tab-admin').onclick = () => switchTab('admin');

// ============ INIT ============
(async function init() {
  if (!configOk) {
    document.getElementById('content').innerHTML = `<div class="config-error">
      <h2>⚙️ Configuração necessária</h2>
      <p>Edita o ficheiro <code>index.html</code> e substitui as constantes <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> pelos valores do teu projeto Supabase.</p>
      <p class="small">Vê o <code>README.md</code> para o passo a passo.</p>
    </div>`;
    return;
  }

  await loadState();
  renderMain();

  // Realtime: refresh when data changes from another user
  sb.channel('kv-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kv_store', filter: `key=eq.${STATE_KEY}` }, async () => {
      await loadState();
      if (currentTab !== 'admin' || !isAdmin) rerender();
    })
    .subscribe();
})();
</script>
